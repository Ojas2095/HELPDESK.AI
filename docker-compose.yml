version: "3.9"

# Local development stack for HELPDESK.AI
# Usage: docker compose up --build

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    image: helpdesk-ai-backend:local
    container_name: helpdesk_backend
    restart: unless-stopped
    ports:
      - "7860:7860"
    environment:
      - ALLOW_DEGRADED_STARTUP=1
      - ENV=development
      - PYTHONPATH=/app
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY:-}
      - TICKET_ENCRYPTION_KEY=${TICKET_ENCRYPTION_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - SLACK_WEBHOOK_URL=${SLACK_WEBHOOK_URL:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_AI=${RATE_LIMIT_AI:-10/minute}
      - RATE_LIMIT_AUTH=${RATE_LIMIT_AUTH:-5/minute}
    volumes:
      - model_cache:/app/backend/models
      - ticket_data:/app/backend/data
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "/app/backend/healthcheck.py"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - helpdesk_net

  redis:
    image: redis:7-alpine
    container_name: helpdesk_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning --requirepass ${REDIS_PASSWORD:-}
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - helpdesk_net

volumes:
  model_cache:
  ticket_data:
  redis_data:

networks:
  helpdesk_net:
    driver: bridge
