name: Markdown Lint
on: [push, pull_request]

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: '**/*.md'
          ignores: |
            .tmp-ci-venv/**/*.md
            node_modules/**/*.md
            venv/**/*.md
            .venv/**/*.md
            dist/**/*.md
            build/**/*.md
            scratch/**/*.md
            Summary/**/*.md
