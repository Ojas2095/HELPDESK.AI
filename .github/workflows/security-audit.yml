name: Tenant Isolation Security Audit

on:
  push:
    branches: [ main, gssoc ]
  pull_request:
    branches: [ main, gssoc ]

jobs:
  security-audit:
    name: Run Tenant Isolation Security Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install fastapi uvicorn pydantic python-dotenv slowapi \
                    supabase==2.22.4 storage3==2.22.4 \
                    requests httpx \
                    pytest pytest-cov
        pip install -r backend/requirements.txt --ignore-requires-python || true

    - name: Run Tenant Isolation Security Tests
      env:
        ALLOW_DEGRADED_STARTUP: "1"
        REQUIRE_SUPABASE: "false"
      run: |
        python -m pytest backend/tests/test_tenant_isolation.py -v

    - name: Run Isolation Audit Engine Tests
      env:
        ALLOW_DEGRADED_STARTUP: "1"
        REQUIRE_SUPABASE: "false"
      run: |
        python -m pytest backend/tests/security/ -v --ignore=backend/tests/security/__pycache__
