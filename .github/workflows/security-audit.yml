name: Tenant Isolation Security Audit

on:
  push:
    branches: [ main, gssoc ]
  pull_request:
    branches: [ main, gssoc ]

permissions:
  contents: read

jobs:
  security-audit:
    name: Run Tenant Isolation Security Tests
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install pytest httpx pytest-cov

    - name: Run Tenant Isolation Security Tests
      env:
        ALLOW_DEGRADED_STARTUP: "1"
        REQUIRE_SUPABASE: "false"
      run: |
        python -m pytest backend/tests/test_tenant_isolation.py -v

    - name: Run Isolation Audit Engine Tests
      env:
        ALLOW_DEGRADED_STARTUP: "1"
        REQUIRE_SUPABASE: "false"
      run: |
        python -m pytest backend/tests/security/ -v --ignore=backend/tests/security/__pycache__
