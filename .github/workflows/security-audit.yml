name: Automated Tenant Isolation & Security Audit

on:
  push:
    branches: [ gssoc ]
  pull_request:
    branches: [ main, gssoc ]

jobs:
  security-audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Security Isolation Integration Tests
        run: |
          cd backend
          python -m unittest tests/security/test_tenant_isolation.py
