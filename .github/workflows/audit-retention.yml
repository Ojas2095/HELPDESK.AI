name: Audit Log Retention & Archival

on:
  schedule:
    # Run daily at midnight
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering of the sweep

jobs:
  run-retention-sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Codebase
        uses: actions/checkout@v4

      - name: Setup Python environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          # Optional cloud archival libraries
          pip install boto3 google-cloud-storage azure-storage-blob || true

      - name: Execute Retention Sweep
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          AUDIT_ARCHIVE_S3_BUCKET: ${{ secrets.AUDIT_ARCHIVE_S3_BUCKET }}
          AUDIT_ARCHIVE_GCS_BUCKET: ${{ secrets.AUDIT_ARCHIVE_GCS_BUCKET }}
          AUDIT_ARCHIVE_AZURE_CONNECTION_STRING: ${{ secrets.AUDIT_ARCHIVE_AZURE_CONNECTION_STRING }}
          AUDIT_ARCHIVE_AZURE_CONTAINER: "audit-logs"
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
        run: |
          python backend/scripts/audit_retention.py
