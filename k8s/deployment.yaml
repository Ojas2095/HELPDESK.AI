apiVersion: apps/v1
kind: Deployment
metadata:
  name: helpdesk-ai-backend
  namespace: helpdesk
  labels:
    app: helpdesk-ai-backend
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: helpdesk-ai-backend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: helpdesk-ai-backend
        tier: backend
    spec:
      # Spread replicas across nodes for HA
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: helpdesk-ai-backend
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
      containers:
        - name: backend
          image: ghcr.io/helpdesk-ai/backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 7860
              name: http
              protocol: TCP
          env:
            - name: ALLOW_DEGRADED_STARTUP
              valueFrom:
                configMapKeyRef:
                  name: helpdesk-ai-config
                  key: ALLOW_DEGRADED_STARTUP
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: helpdesk-ai-config
                  key: REDIS_URL
            - name: SUPABASE_URL
              valueFrom:
                secretKeyRef:
                  name: helpdesk-ai-secrets
                  key: SUPABASE_URL
            - name: SUPABASE_SERVICE_KEY
              valueFrom:
                secretKeyRef:
                  name: helpdesk-ai-secrets
                  key: SUPABASE_SERVICE_KEY
            - name: TICKET_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: helpdesk-ai-secrets
                  key: TICKET_ENCRYPTION_KEY
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: helpdesk-ai-secrets
                  key: SLACK_WEBHOOK_URL
                  optional: true
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
          livenessProbe:
            httpGet:
              path: /health
              port: 7860
            initialDelaySeconds: 120
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /ready
              port: 7860
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: model-cache
              mountPath: /app/backend/models
      volumes:
        - name: model-cache
          emptyDir: {}
      restartPolicy: Always
