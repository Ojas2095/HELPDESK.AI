apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  # IMPORTANT: generated once using the command in deploy/grafana/k8s/README.md
  # Replace this placeholder by running:
  #   PASSWORD=$(openssl rand -base64 24 | tr -d '\n')
  #   kubectl create secret generic grafana-admin -n monitoring \
  #     --from-literal=admin-password="$PASSWORD" --dry-run=client -o yaml | kubectl apply -f -
  #
  admin-password: "CHANGE_ME_GENERATE_AT_INSTALL"
