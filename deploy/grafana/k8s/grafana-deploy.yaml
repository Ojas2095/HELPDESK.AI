apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.0.0
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          ports:
            - containerPort: 3000
          volumeMounts:
            - name: provisioning
              mountPath: /etc/grafana/provisioning/datasources
              subPath: datasources.yml
            - name: provisioning
              mountPath: /etc/grafana/provisioning/dashboards
              subPath: dashboards.yml
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards/helpdesk_backend_dashboard.json
              subPath: helpdesk_backend_dashboard.json
      volumes:
        - name: provisioning
          configMap:
            name: grafana-provisioning
            items:
              - key: datasources.yml
                path: datasources.yml
              - key: dashboards.yml
                path: dashboards.yml
        - name: dashboards
          configMap:
            name: grafana-dashboards
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
